---
name: Security - Dependency Review

'on':
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      fail-on-severity: high
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      # Full allowlist (scorecard preset + project extras): harden-runner
      # enforces the caller's allowed-endpoints literally (its pre hook cannot
      # see resolved preset output), so partial append lists would block
      # checkout.
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        gcr.io:443
        api.osv.dev:443
        api.deps.dev:443
        release-assets.githubusercontent.com:443
    permissions:
      # read: fetch manifest lockfiles for dependency comparison
      contents: read
      # read: read PR metadata for dependency-review-action
      pull-requests: read

# SPDX-License-Identifier: MIT
---
name: CI - Tests

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Compat mode: multi-version matrix, no coverage or PR comments.
  # Org ruleset (checks-git-replay): test / 🧪 Python Compatibility
  #                                  test / Aggregate Python Results
  test:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      publish-test-summary: false
      python-versions: '3.11,3.12,3.13'
      test-path: tests
      coverage: false
      extra-args: '--override-ini=addopts=--strict-markers --strict-config'
      draft-pr-skip: true
      job-name: '🧪 Python Compatibility'
      runner-image: ubuntu-24.04
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      egress-preset: quality
    permissions:
      # write: merge matrix artifacts and update workflow summaries
      actions: write
      # read: checkout repository and install dependencies
      contents: read
      # write: required by the reusable's publish-test-summary job at parse
      # time even though summaries are disabled in compat mode
      pull-requests: write

  # Coverage mode: single version with coverage reporting, artifact, and PR summary.
  # Org ruleset (checks-git-replay): test-coverage / Python Coverage
  test-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      publish-test-summary: true
      python-version: '3.13'
      test-path: tests
      coverage: true
      coverage-format: json
      # Threshold 0 until #9 lands logic to cover (see pyproject fail_under TODO).
      coverage-threshold: 0
      upload-coverage: true
      extra-args: '--override-ini=addopts=--strict-markers --strict-config'
      draft-pr-skip: true
      job-name: Python Coverage
      runner-image: ubuntu-24.04
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      egress-preset: quality
    permissions:
      # write: merge coverage artifacts and update workflow summaries
      actions: write
      # read: checkout repository and install dependencies
      contents: read
      # write: post test results and coverage comments on PRs
      pull-requests: write

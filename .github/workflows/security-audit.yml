---
name: Security - OSV Audit

'on':
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  security-audit:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-security-audit.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      runner-image: ubuntu-24.04
      upload-comment-artifact: ${{ github.event_name == 'pull_request' }}
      egress-policy: block
      egress-preset: quality
    permissions:
      # read: checkout lockfiles and manifests for OSV scanning
      contents: read
      # read: access package metadata used by the security audit tooling
      packages: read

  publish-security-audit-comment:
    needs: security-audit
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-security-audit-comment.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      # read: checkout repository for comment generation
      contents: read
      # write: post OSV audit summary on the PR
      pull-requests: write

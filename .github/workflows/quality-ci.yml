# SPDX-License-Identifier: MIT
---
name: Quality - Lint & Format

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: quality-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality-lint.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    permissions:
      # read: checkout repository for lintro analysis
      contents: read
      # read: pull py-lintro Docker image from GHCR
      packages: read
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      # Org ruleset (checks-git-replay): quality / 🛠️ Lintro Code Quality
      job-name: '🛠️ Lintro Code Quality'
      # renovate keeps this fresh
      lintro-image: 'ghcr.io/lgtm-hq/py-lintro@sha256:be0d47cba973879ad212f2bb6045e5d2d978d5c9dc6a8f55e1a2bbad2f01f2d8'
      egress-policy: block
      egress-preset: quality

  publish-quality-summary:
    needs: quality
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && (
        github.event.pull_request.draft == false
        || github.event.action == 'ready_for_review'
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-quality-summary.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    permissions:
      # read: checkout repository metadata
      contents: read
      # write: post quality summary comment on the PR
      pull-requests: write
    with:
      exit-code: ${{ needs.quality.outputs.exit-code }}
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      egress-preset: github-tooling

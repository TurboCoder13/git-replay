---
# Lintro Configuration
# https://github.com/lgtm-hq/py-lintro
#
# Lintro is the master configuration source for all tools.
# Native tool configs (.prettierrc, .yamllint, etc.) are used when available.

enforce:
  line_length: 88

execution:
  enabled_tools: []
  tool_order: 'priority'
  fail_fast: false
  parallel: true
  max_workers: 10
  auto_install_deps: true

defaults:
  prettier:
    semi: true
    singleQuote: true
    tabWidth: 2
    printWidth: 88
    trailingComma: 'es5'
    overrides:
      - files: '*.md'
        options:
          printWidth: 88

  markdownlint:
    MD013:
      line_length: 88
      code_blocks: false
      tables: false

  yamllint:
    extends: 'default'
    rules:
      comments-indentation: 'disable'
      comments:
        min-spaces-from-content: 1
      truthy:
        check-keys: true
      line-length:
        max: 88
        allow-non-breakable-inline-mappings: true

  hadolint:
    ignored: []
    trusted_registries:
      - 'docker.io'
      - 'gcr.io'
      - 'ghcr.io'
      - 'quay.io'
      - 'registry.hub.docker.com'

tools:
  ruff:
    enabled: true
  black:
    enabled: true
  prettier:
    enabled: true
  markdownlint:
    enabled: true
  yamllint:
    enabled: true
  bandit:
    enabled: true
  hadolint:
    enabled: false
  actionlint:
    enabled: true
  pydoclint:
    enabled: true
  pytest:
    enabled: true
  gitleaks:
    enabled: true
  osv_scanner:
    enabled: true

ai:
  enabled: false
